<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TokenVeil — Connexion</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f5;
    --surface: #ffffff;
    --border: #e6e2d8;
    --border-strong: #d8d3c4;
    --text: #2b2924;
    --text-dim: #79756a;
    --text-faint: #9a9587;
    --accent: #cb7c5c;
    --accent-hover: #b96a4c;
    --accent-soft: #f3e3da;
    --danger: #b3492f;
    --radius-sm: 8px;
    --radius-lg: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #232120;
      --surface: #2a2826;
      --border: #3a3733;
      --border-strong: #4a4640;
      --text: #ece8e1;
      --text-dim: #aba591;
      --text-faint: #837c6c;
      --accent: #d97757;
      --accent-hover: #e8895f;
      --accent-soft: #3d2f27;
      --danger: #e0664a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #card {
    width: min(380px, calc(100vw - 32px));
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
  }
  #mark {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px auto;
  }
  #mark svg { width: 24px; height: 24px; color: #fff; }
  h1 {
    font-family: "Source Serif 4", Georgia, serif;
    font-size: 20px; font-weight: 600; text-align: center; margin: 0 0 4px 0;
  }
  h1 .h1-sub {
    display: block;
    font-family: "Inter", -apple-system, sans-serif;
    font-weight: 500;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .sub { font-size: 13px; color: var(--text-faint); text-align: center; margin: 0 0 26px 0; }
  label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 16px;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.6; cursor: default; }
  #error { color: var(--danger); font-size: 12.5px; margin: -6px 0 14px 0; min-height: 1px; }
  #not-affiliated-disclaimer { font-size: 10.5px; color: var(--text-faint); text-align: center; margin: 18px 0 0 0; line-height: 1.4; }
</style>
</head>
<body>
  <div id="card">
    <div id="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 4 4 12l6 8"/><path d="M14 4l6 8-6 8"/></g><rect x="9.5" y="10.6" width="5" height="2.8" rx="1.4" fill="currentColor" stroke="none"/></svg>
    </div>
    <h1>TokenVeil<span class="h1-sub">multi-IA</span></h1>
    <p class="sub">Connecte-toi pour continuer</p>
    <form id="login-form">
      <label for="username">Identifiant</label>
      <input id="username" type="text" autocomplete="username" autofocus />
      <label for="password">Mot de passe</label>
      <input id="password" type="password" autocomplete="current-password" />
      <p id="error" hidden></p>
      <button id="submit-btn" type="submit">Se connecter</button>
    </form>
    <p id="not-affiliated-disclaimer">Non affilié à Anthropic ou Google. "Claude" est une marque d'Anthropic PBC, "Gemini" une marque de Google LLC.</p>
  </div>

  <script>
    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("error");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      submitBtn.disabled = true;
      submitBtn.textContent = "Connexion…";
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value,
          }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.detail || "Connexion impossible.");
        }
        window.location.href = "/";
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.hidden = false;
        submitBtn.disabled = false;
        submitBtn.textContent = "Se connecter";
      }
    });
  </script>
</body>
</html>
